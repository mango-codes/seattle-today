        // Group events by date
        function groupByDate(events) {
            const groups = {};
            
            events.forEach(event => {
                const date = event.date || 'TBD';
                if (!groups[date]) {
                    groups[date] = [];
                }
                groups[date].push(event);
            });
            
            return groups;
        }
        
        // Format date nicely
        function formatDate(dateStr) {
            if (dateStr === 'TBD') return 'Date TBD';
            
            const date = new Date(dateStr);
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            const dateOnly = date.toDateString();
            const todayOnly = today.toDateString();
            const tomorrowOnly = tomorrow.toDateString();
            
            if (dateOnly === todayOnly) {
                return 'Today';
            } else if (dateOnly === tomorrowOnly) {
                return 'Tomorrow';
            } else {
                return date.toLocaleDateString('en-US', { 
                    weekday: 'long', 
                    month: 'long', 
                    day: 'numeric' 
                });
            }
        }
        
        // Render events
        function renderEvents() {
            const container = document.getElementById('events-container');
            
            if (events.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No events found</h3>
                        <p>Check back later for updates</p>
                    </div>
                `;
                return;
            }
            
            const grouped = groupByDate(events);
            const sortedDates = Object.keys(grouped).sort();
            
            let html = '';
            
            sortedDates.forEach(date => {
                const dateEvents = grouped[date];
                html += `
                    <div class="date-section">
                        <h2 class="date-header">${formatDate(date)}</h2>
                        ${dateEvents.map(event => `
                            <div class="event-card">
                                <div class="event-title">${event.artist}</div>
                                <div class="event-venue">📍 ${event.venue || 'Venue TBD'}</div>
                                <div class="event-meta">
                                    <span class="tag music">${event.category}</span>
                                    ${event.link ? `<a href="${event.link}" target="_blank" class="btn">Get Tickets</a>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // Set last updated date
        function setLastUpdated() {
            document.getElementById('lastUpdated').textContent = new Date().toLocaleDateString();
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderEvents();
            setLastUpdated();
        });
    </script>
