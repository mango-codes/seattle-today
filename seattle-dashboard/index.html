<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seattle Today - What's Good</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .date-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        .filters {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        
        .filter-group label {
            font-size: 0.85rem;
            color: #666;
            font-weight: 500;
        }
        
        select, input {
            padding: 0.6rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            min-width: 150px;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .restaurant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        
        .restaurant-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .restaurant-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            position: relative;
        }
        
        .rank {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255,255,255,0.2);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .restaurant-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            padding-right: 3rem;
        }
        
        .cuisine {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .card-body {
            padding: 1.5rem;
        }
        
        .neighborhood {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #666;
            margin-bottom: 1rem;
        }
        
        .neighborhood::before {
            content: "📍";
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .tag {
            background: #f0f0f0;
            padding: 0.3rem 0.7rem;
            border-radius: 15px;
            font-size: 0.8rem;
            color: #555;
        }
        
        .tag.occasion {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: background 0.2s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a6fd6;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #666;
        }
        
        .empty-state h3 {
            margin-bottom: 1rem;
            color: #333;
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
        
        footer a {
            color: #667eea;
        }
        
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-group {
                width: 100%;
            }
            
            select, input {
                width: 100%;
            }
        }
    </style>
</head>
<body>

        <div class="restaurant-grid" id="restaurantGrid">

        // Populate filter dropdowns
        function populateFilters() {
            const neighborhoods = [...new Set(restaurants.map(r => r.neighborhood))].sort();
            const cuisines = [...new Set(restaurants.map(r => r.cuisine))].sort();
            
            const neighborhoodSelect = document.getElementById('neighborhoodFilter');
            const cuisineSelect = document.getElementById('cuisineFilter');
            
            neighborhoods.forEach(n => {
                const option = document.createElement('option');
                option.value = n;
                option.textContent = n;
                neighborhoodSelect.appendChild(option);
            });
            
            cuisines.forEach(c => {
                const option = document.createElement('option');
                option.value = c;
                option.textContent = c;
                cuisineSelect.appendChild(option);
            });
        }
        
        // Create restaurant card HTML
        function createCard(restaurant, index) {
            const searchQuery = encodeURIComponent(`${restaurant.name} Seattle`);
            const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${searchQuery}`;
            // Search for reservations on Google - shows OpenTable, Resy, Tock, etc.
            const reserveUrl = `https://www.google.com/search?q=${encodeURIComponent(restaurant.name + ' Seattle reservations')}`;
            
            return `
                <div class="restaurant-card" data-neighborhood="${restaurant.neighborhood}" data-cuisine="${restaurant.cuisine}">
                    <div class="card-header">
                        <div class="rank">${index + 1}</div>
                        <div class="restaurant-name">${restaurant.name}</div>
                        <span class="cuisine">${restaurant.cuisine}</span>
                    </div>
                    <div class="card-body">
                        <div class="neighborhood">${restaurant.neighborhood}</div>
                        <div class="tags">
                            ${restaurant.tags.slice(0, 4).map(tag => `<span class="tag occasion">${tag}</span>`).join('')}
                        </div>
                        <div class="actions">
                            <a href="${reserveUrl}" target="_blank" class="btn btn-primary">Find Table</a>
                            <a href="${mapsUrl}" target="_blank" class="btn btn-secondary">Directions</a>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Render restaurants
        function renderRestaurants(restaurantsToRender) {
            const grid = document.getElementById('restaurantGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (restaurantsToRender.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            grid.innerHTML = restaurantsToRender.map((r, i) => createCard(r, i)).join('');
        }
        
        // Filter restaurants
        function filterRestaurants() {
            const neighborhood = document.getElementById('neighborhoodFilter').value;
            const cuisine = document.getElementById('cuisineFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();
            
            const filtered = restaurants.filter(r => {
                const matchNeighborhood = !neighborhood || r.neighborhood === neighborhood;
                const matchCuisine = !cuisine || r.cuisine === cuisine;
                const matchSearch = !search || r.name.toLowerCase().includes(search);
                return matchNeighborhood && matchCuisine && matchSearch;
            });
            
            renderRestaurants(filtered);
        }
        
        // Set current date
        function setDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', options);
            document.getElementById('lastUpdated').textContent = new Date().toLocaleDateString('en-US', options);
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            populateFilters();
            renderRestaurants(restaurants);
            setDate();
            
            // Add event listeners
            document.getElementById('neighborhoodFilter').addEventListener('change', filterRestaurants);
            document.getElementById('cuisineFilter').addEventListener('change', filterRestaurants);
            document.getElementById('searchFilter').addEventListener('input', filterRestaurants);
        });
